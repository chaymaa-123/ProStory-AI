# ProStory-AI - Configuration Docker Compose
# Cette configuration utilise uniquement le Backend et le Frontend.
# La base de données est gérée directement sur Supabase.

services:
  # Backend ProStory-AI avec modèles IA
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prostory-backend-ia
    ports:
      - "8000:8000"
    volumes:
      # Monter le code source pour le rechargement automatique
      - ./backend:/app
      # Monter le cache des modèles pour éviter de les retélécharger
      - model_cache:/root/.cache/huggingface
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=development
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Frontend ProStory-AI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: prostory-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped
    command: npm run dev -- -H 0.0.0.0

volumes:
  model_cache:
    driver: local
